modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/Derekahedron/Inventory-Expansion-Plus/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/Derekahedron/Inventory-Expansion-Plus"
logoFile = "assets/${mod_id}/icon.png"
logoBlur = false
credits="This mod is dedicated to my fiancee"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="BEFORE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="invexp"
mandatory=true
versionRange="${inventory_expansion_version_range}"
ordering="BEFORE"
side="BOTH"